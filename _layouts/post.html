---
layout: default
---

<section class="page-header">
    <h1>{{ page.title }}</h1>
    <p>{{ page.date | date: "%Y 年 %m 月 %d 日" }} | 作者：{{ page.author }}</p>
</section>

<section class="post-content">
    <div class="container" style="max-width: 800px;">
        <article>
            {{ content }}
        </article>
        
        <div style="margin-top: 48px; padding-top: 24px; border-top: 1px solid #e5e7eb;">
            <h3>分享这篇文章</h3>
            <div style="display: flex; gap: 16px; margin-top: 16px;">
                <a href="#" class="btn btn-secondary" style="flex: 1; text-align: center;">分享到微博</a>
                <a href="#" class="btn btn-secondary" style="flex: 1; text-align: center;">分享到微信</a>
                <a href="#" class="btn btn-secondary" style="flex: 1; text-align: center;">复制链接</a>
            </div>
        </div>
        
        <div style="margin-top: 48px; text-align: center;">
            <a href="/news" class="btn btn-primary">返回新闻列表</a>
        </div>
    </div>
</section>

<style>
.post-content {
    padding: 60px 20px;
}

.post-content article {
    line-height: 1.8;
    color: #374151;
}

.post-content h2 {
    font-size: 28px;
    margin-top: 32px;
    margin-bottom: 16px;
    color: #1f2937;
}

.post-content h3 {
    font-size: 22px;
    margin-top: 24px;
    margin-bottom: 12px;
    color: #1f2937;
}

.post-content p {
    margin-bottom: 16px;
}

.post-content ul, .post-content ol {
    margin-left: 24px;
    margin-bottom: 16px;
}

.post-content li {
    margin-bottom: 8px;
}

.post-content blockquote {
    border-left: 4px solid #1e40af;
    padding-left: 16px;
    margin-left: 0;
    margin-bottom: 16px;
    color: #6b7280;
    font-style: italic;
}

.post-content code {
    background: #f3f4f6;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'Courier New', monospace;
}

.post-content pre {
    background: #1f2937;
    color: #d1d5db;
    padding: 16px;
    border-radius: 8px;
    overflow-x: auto;
    margin-bottom: 16px;
}

.post-content pre code {
    background: none;
    padding: 0;
    color: inherit;
}
</style>
