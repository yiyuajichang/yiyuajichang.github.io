<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ page.description | default: site.description }}">
    <meta name="keywords" content="{{ page.keywords | default: site.keywords }}">
    <meta name="author" content="{{ site.author }}">
    <meta property="og:title" content="{{ page.title | default: site.title }}">
    <meta property="og:description" content="{{ page.description | default: site.description }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ page.title | default: site.title }}">
    <meta name="twitter:description" content="{{ page.description | default: site.description }}">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="canonical" href="{{ page.url | absolute_url }}">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 20px rgba(249, 115, 22, 0.3); } 50% { box-shadow: 0 0 40px rgba(249, 115, 22, 0.6); } }
        .animate-fade-in-up { animation: fadeInUp 0.6s ease-out; }
        .animate-slide-in-right { animation: slideInRight 0.6s ease-out; }
        .pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
        .gradient-text { background: linear-gradient(135deg, #f97316 0%, #fb923c 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .glass-effect { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-white to-orange-50">
    <!-- Navigation -->
    <nav class="sticky top-0 z-50 glass-effect border-b border-slate-200">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-orange-400 to-orange-600 rounded-lg flex items-center justify-center text-white font-bold text-lg">¥</div>
                <span class="font-bold text-lg text-slate-900 hidden sm:inline">{{ site.title | split: ' ' | first }}</span>
            </div>
            <div class="flex items-center gap-6">
                <a href="/" class="text-slate-600 hover:text-orange-600 transition font-medium text-sm">首页</a>
                <a href="/categories/" class="text-slate-600 hover:text-orange-600 transition font-medium text-sm">分类</a>
                <a href="/tags/" class="text-slate-600 hover:text-orange-600 transition font-medium text-sm">标签</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="min-h-screen">
        {{ content }}
    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 text-slate-300 py-16 mt-20">
        <div class="max-w-6xl mx-auto px-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-12 mb-12">
                <div>
                    <h3 class="font-bold text-white mb-4">{{ site.title | split: ' ' | first }}</h3>
                    <p class="text-sm leading-relaxed">{{ site.description | truncate: 100 }}</p>
                </div>
                <div>
                    <h4 class="font-bold text-white mb-4">快速链接</h4>
                    <ul class="space-y-2 text-sm">
                        <li><a href="/" class="hover:text-orange-400 transition">首页</a></li>
                        <li><a href="/categories/" class="hover:text-orange-400 transition">分类</a></li>
                        <li><a href="/tags/" class="hover:text-orange-400 transition">标签</a></li>
                    </ul>
                </div>
                <div>
                    <h4 class="font-bold text-white mb-4">资源</h4>
                    <ul class="space-y-2 text-sm">
                        <li><a href="/feed.xml" class="hover:text-orange-400 transition">RSS 订阅</a></li>
                        <li><a href="/sitemap.xml" class="hover:text-orange-400 transition">网站地图</a></li>
                    </ul>
                </div>
                <div>
                    <h4 class="font-bold text-white mb-4">关于</h4>
                    <p class="text-sm">{{ site.author }} © 2024-{{ site.time | date: "%Y" }}</p>
                </div>
            </div>
            <div class="border-t border-slate-700 pt-8 text-center text-sm">
                <p>本站仅供学习交流使用，请遵守当地法律法规。</p>
            </div>
        </div>
    </footer>

    <script>
        document.querySelectorAll('[data-animate]').forEach(el => {
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add(entry.target.dataset.animate);
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1 });
            observer.observe(el);
        });
    </script>
</body>
</html>
