name: IndexNow - Submit All Posts to Bing

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '_posts/**'

jobs:
  indexnow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install pyyaml

      - name: Submit all posts to IndexNow
        run: python3 scripts/submit_indexnow.py
